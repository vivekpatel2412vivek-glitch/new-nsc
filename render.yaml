# Render blueprint - https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then on Render "New +" -> "Blueprint" ->
# pick this repo. Set GEMINI_API_KEY / DASHBOARD_USERNAME / DASHBOARD_PASSWORD
# in the Render dashboard after the first deploy (marked sync: false below so
# they're never committed to the repo).
#
# Free-tier caveat: Render's free web services have no persistent disk and
# spin down after 15 min idle. ledger.csv / data/snapshots / reports / logs
# survive between requests while the service is awake, but reset whenever a
# new instance spins up after idling or a redeploy happens. For a paper
# ledger that must never lose history, add a paid persistent disk or move
# the ledger to a real database - this deploy is fine for demos/sharing, not
# for long-term record-keeping.
services:
  - type: web
    name: nifty-options-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 dashboard.py
    envVars:
      - key: DASHBOARD_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: GEMINI_API_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
